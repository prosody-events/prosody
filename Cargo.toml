[workspace.dependencies]
ahash = "0.8"
confique = "0.2"
crossbeam-utils = "0.8"
educe = "0.6"
futures = "0.3"
humantime-serde = "1.1"
internment = "0.8"
magnus = "0.6"
neon = "1.0"
nohash-hasher = "0.2"
opentelemetry = "0.23"
opentelemetry_sdk = "0.23"
parking_lot = "0.12"
pin-project = "1.1"
pyo3 = "0.21"
quickcheck = "1.0"
quickcheck_macros = "1.0"
rdkafka = "0.36"
scc = "2.1"
serde = "1.0"
serde_json = "1.0"
thiserror = "1.0"
tokio = "1.37"
tokio-stream = "0.1"
tracing = "0.1"
tracing-opentelemetry = "0.24"
validator = "0.18"
whoami = "1.5"

[profile.release]
